[build]
builder = "dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
# THIS IS THE CRITICAL LINE
startCommand = "node /openclaw/dist/entry.js gateway run --bind 0.0.0.0 --port 8080 --auth token --token $OPENCLAW_GATEWAY_TOKEN"

[variables]
PORT = "8080"
OPENCLAW_GATEWAY_PORT = "8080"
OPENCLAW_AUTH_TYPE = "token"
OPENCLAW_SKIP_CONFIG_SYNC = "true"
