[build]
builder = "dockerfile"

[deploy]
# We removed the healthcheck lines entirely to stop the restart loop
restartPolicyType = "on_failure"
startCommand = "node /openclaw/dist/entry.js gateway run --bind auto --port 8080 --auth token --token $OPENCLAW_GATEWAY_TOKEN"

[variables]
PORT = "8080"
OPENCLAW_GATEWAY_PORT = "8080"
OPENCLAW_AUTH_TYPE = "token"
OPENCLAW_SKIP_CONFIG_SYNC = "true"
INTERNAL_GATEWAY_HOST = "127.0.0.1"
INTERNAL_GATEWAY_PORT = "18789"
MCPORTER_CONFIG = "/data/.openclaw/config/mcporter.json"
OPENCLAW_ENTRY = "/openclaw/dist/entry.js"
OPENCLAW_STATE_DIR = "/data/.openclaw"
OPENCLAW_WORKSPACE_DIR = "/data/workspace"
SENPI_MCP_URL = "https://mcp.prod.senpi.ai/mcp"
